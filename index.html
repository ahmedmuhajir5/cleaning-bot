<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SparkleBot – Cleaning Service Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint:        #c8f5e8;
    --teal:        #1a8f72;
    --teal-dark:   #12614f;
    --cream:       #f9f6f0;
    --white:       #ffffff;
    --gray-100:    #f2efe9;
    --gray-200:    #e4e0d8;
    --gray-500:    #8a8277;
    --gray-800:    #2e2b26;
    --bubble-user: #1a8f72;
    --bubble-bot:  #ffffff;
    --radius:      18px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse 60% 50% at 10% 0%, #c8f5e880 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 100%, #b3ede080 0%, transparent 60%);
  }

  /* ── Widget shell ── */
  .widget {
    width: 100%;
    max-width: 440px;
    background: var(--white);
    border-radius: 28px;
    box-shadow:
      0 4px 6px -1px rgba(0,0,0,.06),
      0 20px 60px -10px rgba(18,97,79,.18);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: rise .55s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes rise { from { opacity:0; transform:translateY(28px); } }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal) 100%);
    padding: 22px 24px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    right: -30px; top: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,.07);
  }
  .header::before {
    content: '';
    position: absolute;
    right: 30px; bottom: -20px;
    width: 70px; height: 70px;
    border-radius: 50%;
    background: rgba(255,255,255,.05);
  }
  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    backdrop-filter: blur(4px);
    border: 1.5px solid rgba(255,255,255,.25);
  }
  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    color: #fff;
    font-size: 17px;
    letter-spacing: .01em;
    line-height: 1.2;
  }
  .header-text p {
    color: rgba(255,255,255,.72);
    font-size: 12px;
    margin-top: 2px;
    font-weight: 400;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #6fecb8;
    display: inline-block;
    margin-right: 5px;
    box-shadow: 0 0 0 2px rgba(111,236,184,.3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 2px rgba(111,236,184,.3); }
    50%      { box-shadow: 0 0 0 5px rgba(111,236,184,.1); }
  }

  /* ── Message list ── */
  .messages {
    flex: 1;
    padding: 20px 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 380px;
    max-height: 460px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

  /* ── Bubbles ── */
  .msg { display: flex; gap: 8px; align-items: flex-end; animation: pop .3s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes pop { from { opacity:0; transform:scale(.88) translateY(6px); } }
  .msg.user { flex-direction: row-reverse; }

  .bubble {
    max-width: 80%;
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.bot  .bubble {
    background: var(--bubble-bot);
    color: var(--gray-800);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 0 0 1px var(--gray-200);
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bot-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--mint);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    border: 1.5px solid rgba(26,143,114,.2);
  }

  /* typing indicator */
  .typing-bubble {
    display: flex; gap: 5px;
    padding: 13px 16px;
    align-items: center;
  }
  .typing-bubble span {
    width: 7px; height: 7px;
    background: var(--gray-500);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: .2s; }
  .typing-bubble span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{ transform:translateY(0); } 40%{ transform:translateY(-6px); } }

  /* ── Quick replies ── */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 4px 18px 14px;
  }
  .qr-btn {
    background: var(--gray-100);
    border: 1.5px solid var(--gray-200);
    color: var(--teal-dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 6px 13px;
    border-radius: 20px;
    cursor: pointer;
    transition: background .18s, border-color .18s, transform .12s;
    white-space: nowrap;
  }
  .qr-btn:hover {
    background: var(--mint);
    border-color: var(--teal);
    transform: translateY(-1px);
  }

  /* ── Input bar ── */
  .input-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid var(--gray-200);
    background: var(--white);
  }
  .input-bar textarea {
    flex: 1;
    resize: none;
    border: 1.5px solid var(--gray-200);
    border-radius: 22px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--gray-800);
    background: var(--gray-100);
    outline: none;
    line-height: 1.4;
    max-height: 110px;
    transition: border-color .2s, background .2s;
    overflow-y: auto;
  }
  .input-bar textarea:focus {
    border-color: var(--teal);
    background: var(--white);
  }
  .input-bar textarea::placeholder { color: var(--gray-500); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--teal);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .18s, transform .12s, box-shadow .18s;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(26,143,114,.35);
  }
  .send-btn:hover { background: var(--teal-dark); transform: scale(1.07); }
  .send-btn:active { transform: scale(.96); }
  .send-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Branding ── */
  .branding {
    text-align: center;
    padding: 10px 0 14px;
    font-size: 11px;
    color: var(--gray-500);
    letter-spacing: .03em;
  }
</style>
</head>
<body>

<div class="widget">
  <!-- Header -->
  <div class="header">
    <div class="avatar">🧹</div>
    <div class="header-text">
      <h1>SparkleBot</h1>
      <p><span class="status-dot"></span>Online – Cleaning Assistant</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quickReplies"></div>

  <!-- Input -->
  <div class="input-bar">
    <textarea id="userInput" placeholder="Type a message…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" title="Send">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <div class="branding">Powered by SparkleClean ✦ AI Assistant</div>
</div>

<script>
/* ── CONFIG ── */
const SYSTEM_PROMPT = `You are SparkleBot, a friendly and professional AI assistant for a cleaning service company. Your role is to help customers with quotes, service information, and booking.

SERVICES:
- Regular home cleaning
- Deep cleaning (1.5× price)
- Move-in / move-out cleaning
- Office cleaning

PRICING:
- Base rate: €20/hour
- Small apartment (1–2 rooms): 2–3 hours → €40–€60
- Medium home (3–4 rooms): 3–5 hours → €60–€100
- Large home (5+ rooms): 5+ hours → €100+
- Deep cleaning: multiply total by 1.5

BOOKING FLOW (when user wants to book):
1. Ask for preferred date and time
2. Ask for address
3. Ask for name and phone/email
4. Confirm booking with a clear summary

BEHAVIOR:
- Be warm, concise, and helpful — sound human, not robotic
- Always guide toward a quote or booking
- If unsure, offer to save details for a follow-up
- Format prices clearly with € symbol
- Use short paragraphs; avoid walls of text
- When giving a price estimate, show your working clearly

Start every fresh conversation warmly.`;

const QUICK_REPLY_SETS = {
  default: ["💰 Get a quote", "📋 Our services", "📅 Book a cleaning", "📞 Contact us"],
  afterQuote: ["📅 Book this service", "🔍 More details", "💬 Ask something else"],
  afterServices: ["💰 Get a quote", "📅 Book now", "💬 Ask something else"],
};

/* ── STATE ── */
let conversationHistory = [];
let currentQuickReplies = QUICK_REPLY_SETS.default;

/* ── DOM ── */
const messagesEl   = document.getElementById('messages');
const quickReplies = document.getElementById('quickReplies');
const input        = document.getElementById('userInput');
const sendBtn      = document.getElementById('sendBtn');

/* ── INIT ── */
window.addEventListener('DOMContentLoaded', () => {
  showTypingThenSay(
    "Hi there! 👋 Welcome to SparkleClean.\n\nI'm SparkleBot — I can give you a price estimate, explain our services, or help you book a cleaning. What can I help you with today?",
    QUICK_REPLY_SETS.default
  );
});

/* ── HELPERS ── */
function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  if (role === 'bot') {
    const icon = document.createElement('div');
    icon.className = 'bot-icon';
    icon.textContent = '✦';
    wrap.appendChild(icon);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);

  messagesEl.appendChild(wrap);
  scrollToBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing';

  const icon = document.createElement('div');
  icon.className = 'bot-icon';
  icon.textContent = '✦';
  wrap.appendChild(icon);

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(bubble);

  messagesEl.appendChild(wrap);
  scrollToBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setQuickReplies(replies) {
  quickReplies.innerHTML = '';
  replies.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = label;
    btn.addEventListener('click', () => handleUserMessage(label));
    quickReplies.appendChild(btn);
  });
  currentQuickReplies = replies;
}

async function showTypingThenSay(text, qr = null) {
  showTyping();
  await new Promise(r => setTimeout(r, 900 + Math.random() * 600));
  removeTyping();
  addMessage('bot', text);
  if (qr) setQuickReplies(qr);
}

/* ── ANTHROPIC API CALL ── */
async function callClaude(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: conversationHistory,
    }),
  });

  if (!response.ok) throw new Error(`API error ${response.status}`);

  const data = await response.json();
  const reply = data.content.map(b => b.text || '').join('').trim();
  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

/* ── DETECT CONTEXT FOR SMART QUICK REPLIES ── */
function detectQuickReplies(text) {
  const lower = text.toLowerCase();
  if (lower.includes('€') || lower.includes('estimate') || lower.includes('price') || lower.includes('cost')) {
    return QUICK_REPLY_SETS.afterQuote;
  }
  if (lower.includes('regular') || lower.includes('deep clean') || lower.includes('move-in') || lower.includes('office')) {
    return QUICK_REPLY_SETS.afterServices;
  }
  return QUICK_REPLY_SETS.default;
}

/* ── MAIN HANDLER ── */
async function handleUserMessage(text) {
  const trimmed = text.trim();
  if (!trimmed) return;

  input.value = '';
  input.style.height = 'auto';
  setQuickReplies([]);

  addMessage('user', trimmed);
  showTyping();

  try {
    const reply = await callClaude(trimmed);
    removeTyping();
    addMessage('bot', reply);
    setQuickReplies(detectQuickReplies(reply));
  } catch (err) {
    removeTyping();
    addMessage('bot', "Hmm, something went wrong on my end. Please try again in a moment! 🙏");
    setQuickReplies(QUICK_REPLY_SETS.default);
    console.error(err);
  }
}

/* ── INPUT EVENTS ── */
sendBtn.addEventListener('click', () => handleUserMessage(input.value));

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleUserMessage(input.value);
  }
});

// Auto-grow textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 110) + 'px';
});
</script>

</body>
</html>
